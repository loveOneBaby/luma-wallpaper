name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  NODE_VERSION: "24"
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Match tag to package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION."
            exit 1
          fi

  web:
    name: Test and build Web
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit:ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Create web archive
        shell: bash
        run: |
          mkdir -p release
          VERSION=$(node -p "require('./package.json').version")
          cd dist
          zip -r "../release/Luma-${VERSION}-web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: luma-web
          path: release/*-web.zip
          if-no-files-found: error
          retention-days: 14

      - name: Reuse renderer in desktop jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: renderer-dist
          path: dist
          if-no-files-found: error
          retention-days: 2

  macos:
    name: macOS (${{ matrix.label }})
    needs: web
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: apple-silicon
            runner: macos-15
            arch: arm64
          - label: intel
            runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Download tested renderer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: renderer-dist
          path: dist

      - name: Package, sign, and notarize macOS app
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          values=("$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY_BASE64" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER" "$APPLE_TEAM_ID")
          configured=0
          for value in "${values[@]}"; do
            [[ -z "$value" ]] || configured=$((configured + 1))
          done
          if (( configured > 0 && configured < ${#values[@]} )); then
            echo "macOS signing is only partially configured. Supply every documented secret or none for a manual unsigned build."
            exit 1
          fi

          KEY_PATH=""
          cleanup() { [[ -z "$KEY_PATH" ]] || rm -f "$KEY_PATH"; }
          trap cleanup EXIT

          BUILD_ARGS=(--mac --${{ matrix.arch }} --publish never)
          if (( configured == ${#values[@]} )); then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            export APPLE_API_KEY="$KEY_PATH"
            BUILD_ARGS+=(--config.mac.notarize=true)
          else
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::warning title=Unsigned macOS artifact::This build is not signed and cannot auto-update on macOS. Configure the Apple Developer ID secrets (MAC_CSC_LINK, MAC_CSC_KEY_PASSWORD, APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER, APPLE_TEAM_ID) to enable signed, notarized releases."
          fi

          npx --no-install electron-builder "${BUILD_ARGS[@]}"

          if (( configured == ${#values[@]} )); then
            APP_PATH=$(find release -maxdepth 2 -type d -name 'Luma.app' -print -quit)
            [[ -n "$APP_PATH" ]] || { echo "Packaged Luma.app was not found"; exit 1; }
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            TEAM_ID=$(codesign -dv --verbose=4 "$APP_PATH" 2>&1 | sed -n 's/^TeamIdentifier=//p')
            if [[ -z "$TEAM_ID" || "$TEAM_ID" == "not set" || "$TEAM_ID" == "not-set" ]]; then
              echo "Packaged app does not contain a Developer ID TeamIdentifier"
              exit 1
            fi
            xcrun stapler validate "$APP_PATH"
          fi

      - name: Verify macOS update metadata
        shell: bash
        run: |
          compgen -G "release/*-mac.zip" >/dev/null
          compgen -G "release/*.blockmap" >/dev/null
          node scripts/validate-update-artifacts.mjs \
            --dir release "release/latest-${{ matrix.arch }}-mac.yml"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: luma-macos-${{ matrix.label }}
          path: |
            release/*.dmg
            release/*-mac.zip
            release/*.blockmap
            release/latest-*-mac.yml
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x64
    needs: web
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Download tested renderer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: renderer-dist
          path: dist

      - name: Package and validate Windows installer
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          if ($hasCertificate -ne $hasPassword) {
            throw "Windows signing is partially configured. Set both WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD."
          }
          if (-not $hasCertificate) {
            Write-Output "::warning title=Unsigned Windows artifact::WIN_CSC_LINK is not configured; publishing an unknown-publisher installer."
            Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          }

          npx --no-install electron-builder --win --x64 --publish never
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed with exit code $LASTEXITCODE" }

          $installers = Get-ChildItem "release/*.exe"
          if (-not $installers) { throw "Windows installer was not generated" }
          if ($hasCertificate) {
            $installers | ForEach-Object {
              $signature = Get-AuthenticodeSignature $_.FullName
              if ($signature.Status -ne "Valid") {
                throw "$($_.Name) has invalid Authenticode status: $($signature.Status)"
              }
            }
          }

      - name: Verify Windows update metadata
        shell: pwsh
        run: |
          if (-not (Get-ChildItem "release/*.exe.blockmap")) { throw "Windows blockmap was not generated" }
          node scripts/validate-update-artifacts.mjs --dir release release/latest.yml

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: luma-windows-x64
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish and verify GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - web
      - macos
      - windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: luma-*
          path: release-assets
          merge-multiple: true

      - name: Validate merged update artifacts
        run: node scripts/validate-update-artifacts.mjs --dir release-assets

      - name: Require R2 configuration
        shell: bash
        env:
          HAS_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID != '' }}
          HAS_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
          HAS_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY != '' }}
          HAS_R2_BUCKET: ${{ secrets.R2_BUCKET != '' }}
        run: |
          missing=()
          [[ "$HAS_R2_ACCOUNT_ID" == "true" ]] || missing+=(R2_ACCOUNT_ID)
          [[ "$HAS_R2_ACCESS_KEY_ID" == "true" ]] || missing+=(R2_ACCESS_KEY_ID)
          [[ "$HAS_R2_SECRET_ACCESS_KEY" == "true" ]] || missing+=(R2_SECRET_ACCESS_KEY)
          [[ "$HAS_R2_BUCKET" == "true" ]] || missing+=(R2_BUCKET)
          if (( ${#missing[@]} > 0 )); then
            echo "Publishing to R2 requires these secrets: ${missing[*]}"
            exit 1
          fi
          R2_PUBLIC_URL=$(node -p "require('./package.json').build.win.publish[0].url")
          if [[ "$R2_PUBLIC_URL" == "https://r2-public-url.invalid" || -z "$R2_PUBLIC_URL" ]]; then
            echo "package.json build.*.publish[].url is still the placeholder. Set the real R2 public URL before tagging a release."
            exit 1
          fi
          echo "R2_PUBLIC_URL=$R2_PUBLIC_URL" >> "$GITHUB_ENV"

      - name: Upload artifacts to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for file in release-assets/*; do
            name=$(basename "$file")
            if [[ "$name" == *.yml ]]; then
              cache="no-cache"
              content_type="text/yaml"
            else
              cache="public, max-age=31536000, immutable"
              content_type="application/octet-stream"
            fi
            aws s3 cp "$file" "s3://${R2_BUCKET}/${name}" \
              --endpoint-url "$ENDPOINT" \
              --region auto \
              --cache-control "$cache" \
              --content-type "$content_type" \
              --no-progress
          done

      - name: Verify published artifacts over R2 HTTP
        run: |
          node scripts/verify-r2-release.mjs \
            --base-url "$R2_PUBLIC_URL" \
            --local-dir release-assets
