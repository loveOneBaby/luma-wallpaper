name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  NODE_VERSION: "24"

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Match tag to package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION."
            exit 1
          fi

  web:
    name: Web
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Create web archive
        shell: bash
        run: |
          mkdir -p release
          VERSION=$(node -p "require('./package.json').version")
          cd dist
          zip -r "../release/Luma-${VERSION}-web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: luma-web
          path: release/*-web.zip
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS (${{ matrix.label }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: apple-silicon
            runner: macos-15
            arch: arm64
          - label: intel
            runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package macOS app
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: luma-macos-${{ matrix.label }}
          path: |
            release/*.dmg
            release/*-mac.zip
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x64
    needs: validate
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: luma-windows-x64
          path: release/*.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - web
      - macos
      - windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "Luma $GITHUB_REF_NAME"
          fi
