<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; media-src luma-media:; script-src 'self'; style-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luma 动态壁纸</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #wallpaper-status {
        position: fixed;
        inset: auto 20px 20px;
        color: rgba(255, 255, 255, 0.78);
        font: 13px/1.4 system-ui, sans-serif;
        text-align: center;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
      }
    </style>
  </head>
  <body>
    <video id="wallpaper-video" autoplay loop muted playsinline></video>
    <p id="wallpaper-status" role="status" hidden></p>
    <script type="module" src="./wallpaper-renderer.mjs"></script>
  </body>
</html>
